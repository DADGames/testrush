<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Resort Tycoon | CrazyGames</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Nunito:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #FFD700; 
            --bright-green: #2ECC71; 
            --gardenscapes-orange: #FF8C00;
            --font-main: 'Fredoka', sans-serif;
            --font-text: 'Nunito', sans-serif;
        }

        body, html { 
            margin: 0; padding: 0; 
            font-family: var(--font-text); 
            background: #1a1a1a; color: white; 
            height: 100%; width: 100%; overflow: hidden; 
        }

        .screen { 
            display: none; height: 100vh; width: 100vw; 
            flex-direction: column; justify-content: center; 
            align-items: center; position: absolute; 
            background-size: cover; background-position: center;
            background-repeat: no-repeat;
        }
        
        .active { display: flex; }

        #preloader, #splash { 
            background-color: #2c3e50; 
            background-image: url('assets/logo.png');
            background-size: contain; /* Чтобы логотип не срезало */
            background-position: center 30%;
        }

        #letter-screen { background-color: #34495e; background-image: url('assets/reception.png'); }
        #map-screen { background-color: #27ae60; background-image: url('assets/map.png'); }

        .overlay-dark {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); z-index: 1;
        }
        .paper { 
            background: #fdf5e6; color: #333; padding: 25px; border-radius: 25px; 
            width: 85%; max-width: 380px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
            border: 4px solid #e0d5b8; position: relative; z-index: 2; text-align: center;
            box-sizing: border-box;
        }

        h2 { 
            font-family: var(--font-main); 
            font-size: 28px;
            color: var(--gardenscapes-orange);
            text-shadow: 1px 1px 0px #fff;
            margin-top: 0;
        }

        input, select { 
            width: 100%; margin: 10px 0; padding: 14px; 
            border-radius: 12px; border: 2px solid #ddd; 
            font-size: 16px; font-family: var(--font-text);
            box-sizing: border-box; 
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .btn-action { 
            font-family: var(--font-main);
            background: var(--bright-green); color: white; 
            border: none; padding: 18px; border-radius: 50px; 
            font-size: 1.6rem; cursor: pointer; 
            box-shadow: 0 6px 0 #27ae60; width: 100%; 
            margin-top: 10px;
        }
        .btn-action:disabled { background: #bdc3c7; box-shadow: 0 6px 0 #95a5a6; }

        .map-icon {
            position: absolute; width: 70px; height: 70px;
            background-size: cover; z-index: 500;
            border-radius: 50%;
        }

        .icon-lock { 
            background-color: rgba(0,0,0,0.5);
            background-image: url('assets/ui_spritesheet.png');
            background-position: -896px -640px;
            display: flex; align-items: center; justify-content: center;
        }
        .icon-lock::after { content: '🔒'; font-size: 24px; }

        .icon-garden-start { 
            background-color: var(--gold);
            background-image: url('assets/ui_spritesheet.png');
            background-position: 0px 0px; 
            z-index: 600;
            cursor: pointer;
            display: none; 
            border: 4px solid white;
            box-shadow: 0 0 20px var(--gold);
        }

        .blink { animation: blinkAnim 1.2s infinite; }
        @keyframes blinkAnim {
            0% { filter: brightness(1); transform: scale(1); }
            50% { filter: brightness(1.3); transform: scale(1.1); }
            100% { filter: brightness(1); transform: scale(1); }
        }

        #finger-pointer {
            position: absolute; width: 60px; height: 60px;
            background-image: url('assets/ui_spritesheet.png');
            background-position: -384px -896px;
            z-index: 1100; display: none; pointer-events: none;
            animation: fingerClick 0.8s infinite;
        }
        #finger-pointer::before { content: '👆'; font-size: 50px; }

        @keyframes fingerClick {
            0% { transform: translateY(0); }
            50% { transform: translateY(15px); }
            100% { transform: translateY(0); }
        }

        .pos-court { top: 18%; left: 20%; }
        .pos-dog { top: 12%; left: 72%; }
        .pos-houseL { top: 45%; left: 15%; }
        .pos-houseR { top: 40%; left: 78%; }
        .pos-garden { top: 60%; left: 45%; } 

        .parrot-talk-wrap {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); width: 90%; max-width: 600px;
            display: none; align-items: flex-end; z-index: 1000;
        }

        .dialog-frame {
            flex: 1; min-height: 120px;
            background: #fff; border: 4px solid var(--gardenscapes-orange);
            border-radius: 20px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px; 
            color: #333; font-family: var(--font-main); font-size: 18px;
            text-align: center; position: relative;
        }

        .btn-next-dialog {
            margin-top: 10px; background: var(--bright-green);
            color: white; border: none; padding: 5px 20px;
            border-radius: 15px; font-family: var(--font-main);
            font-size: 16px; cursor: pointer; box-shadow: 0 3px 0 #27ae60;
        }

        .parrot-img {
            width: 120px; height: 120px;
            background: #f1c40f; border-radius: 50%;
            margin-left: -20px; z-index: 1001;
            border: 4px solid white; flex-shrink: 0;
        }
        .parrot-img::after { content: '🦜'; font-size: 60px; display: block; text-align: center; line-height: 110px; }

        .bottom-phrases {
            position: absolute; bottom: 44%; /* Текст загрузки на 3% ниже от центра (50-3-3) */
            font-family: var(--font-main); font-size: 1.2rem;
            text-shadow: 2px 2px 0px #000;
            background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 50px;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop preload="auto">
        <source src="music/background_music.mp3" type="audio/mpeg">
    </audio>

    <div id="preloader" class="screen active"></div>
    <div id="splash" class="screen"><div class="bottom-phrases" id="random-tip">ЗАГРУЗКА...</div></div>

    <div id="letter-screen" class="screen">
        <div class="overlay-dark"></div>
        <div class="paper">
            <h2>РЕГИСТРАЦИЯ</h2>
            <input type="text" id="pName" placeholder="Твое Имя" oninput="validate()" onpaste="return false;">
            <input type="text" id="rName" placeholder="Название Острова" oninput="validate()" onpaste="return false;">
            <select id="userCountry" onchange="validate()">
                <option value="">Страна (для рейтинга)</option>
            </select>
            <button id="start-btn" class="btn-action" disabled onclick="startJourney()">В ПУТЬ!</button>
        </div>
    </div>

    <div id="map-screen" class="screen">
        <div class="map-icon icon-lock pos-court"></div>
        <div class="map-icon icon-lock pos-dog"></div>
        <div class="map-icon icon-lock pos-houseL"></div>
        <div class="map-icon icon-lock pos-houseR"></div>
        
        <div id="garden-entry" class="map-icon icon-garden-start pos-garden" onclick="goToGame()"></div>
        <div id="finger-pointer" class="pos-garden" style="margin-top: -50px; margin-left: 20px;"></div>

        <div class="parrot-talk-wrap" id="parrot-ui">
            <div class="dialog-frame">
                <span id="parrot-phrase">...</span>
                <button class="btn-next-dialog" onclick="nextDialogue()">ДАЛЕЕ</button>
            </div>
            <div class="parrot-img"></div>
        </div>
    </div>

    <script>
        const countryList = ["Австралия", "Австрия", "Азербайджан", "Албания", "Алжир", "Ангола", "Андорра", "Антигуа и Барбуда", "Аргентина", "Армения", "Афганистан", "Багамы", "Бангладеш", "Барбадос", "Бахрейн", "Белиз", "Бельгия", "Бенин", "Беларусь", "Болгария", "Боливия", "Босния и Герцеговина", "Ботсвана", "Бразилия", "Бруней", "Буркина-Фасо", "Бурунди", "Бутан", "Вануату", "Великобритания", "Венгрия", "Венесуэла", "Вьетнам", "Габон", "Гаити", "Гайана", "Гамбия", "Гана", "Гватемала", "Гвинея", "Гвинея-Бисау", "Германия", "Гондурас", "Гренада", "Греция", "Грузия", "Дания", "Джибути", "Доминика", "Доминиканская Республика", "Египет", "Замбия", "Зимбабве", "Израиль", "Индия", "Индонезия", "Иордания", "Ирак", "Иран", "Ирландия", "Исландия", "Испания", "Италия", "Йемен", "Кабо-Верде", "Казахстан", "Камбоджа", "Камерун", "Канада", "Катар", "Кения", "Кипр", "Кыргызстан", "Кирибати", "Китай", "Колумбия", "Коморы", "Конго", "Коста-Рика", "Кот-д'Ивуар", "Куба", "Кувейт", "Лаос", "Латвия", "Лесото", "Либерия", "Ливан", "Ливия", "Литва", "Лихтенштейн", "Люксембург", "Маврикий", "Мавритания", "Мадагаскар", "Малави", "Малайзия", "Мали", "Мальдивы", "Мальта", "Марокко", "Маршалловы Острова", "Мексика", "Микронезия", "Мозамбик", "Молдова", "Монако", "Монголия", "Мьянма", "Намибия", "Науру", "Непал", "Нигер", "Нигерия", "Нидерланды", "Никарагуа", "Новая Зеландия", "Норвегия", "ОАЭ", "Оман", "Пакистан", "Палау", "Панама", "Папуа — Новая Гвинея", "Парагвай", "Перу", "Польша", "Португалия", "Россия", "Руанда", "Румыния", "Сальвадор", "Самоа", "Сан-Марино", "Сан-Томе и Принсипи", "Саудовская Аравия", "Северная Македония", "Сейшелы", "Сенегал", "Сент-Винсент и Гренадины", "Сент-Китс и Невис", "Сент-Люсия", "Сербия", "Сингапур", "Сирия", "Словакия", "Словения", "Соломоновы Острова", "Сомали", "Судан", "Суринам", "США", "Сьерра-Леоне", "Таджикистан", "Таиланд", "Танзания", "Того", "Тонга", "Тринидад и Тобаго", "Тувалу", "Тунис", "Туркменистан", "Турция", "Уганда", "Узбекистан", "Украина", "Уругвай", "Фиджи", "Филиппины", "Финляндия", "Франция", "Хорватия", "ЦАР", "Чад", "Черногория", "Чехия", "Чили", "Швейцария", "Швеция", "Шри-Ланка", "Эквадор", "Экваториальная Гвинея", "Эритрея", "Эсватини", "Эстония", "Эфиопия", "ЮАР", "Южная Корея", "Южный Судан", "Ямайка", "Япония"];

        const select = document.getElementById('userCountry');
        countryList.forEach(country => {
            const opt = document.createElement('option');
            opt.value = country; opt.innerText = country;
            select.appendChild(opt);
        });

        const music = document.getElementById('bgMusic');
        music.volume = 0.1; // Громкость 10%
        
        let dialogues = [];
        let currentDialogue = 0;

        window.addEventListener('load', () => {
            setTimeout(() => {
                showScreen('splash');
                music.play().catch(() => {}); // Пробуем старт на сплеше
            }, 1500);
        });

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');

            if(id === 'splash') {
                setTimeout(() => showScreen('letter-screen'), 2000);
            }

            if(id === 'map-screen') {
                const name = document.getElementById('pName').value;
                const country = document.getElementById('userCountry').value;
                
                dialogues = [
                    `Привет, ${name}! Это твой шанс попасть в рейтинг лучших резортов мира`,
                    `И поднять рейтинг страны: ${country}!`,
                    `Но сначала приведи все в порядок...`,
                    `Жми на локацию сада и начинай все улучшать! Удачи!`
                ];
                
                document.getElementById('parrot-phrase').innerText = dialogues[0];
                setTimeout(() => {
                    document.getElementById('parrot-ui').style.display = 'flex';
                }, 500);
            }
        }

        function startJourney() {
            music.play().catch(() => {}); // Повторный старт при клике
            showScreen('map-screen');
        }

        function nextDialogue() {
            currentDialogue++;
            if (currentDialogue < dialogues.length) {
                document.getElementById('parrot-phrase').innerText = dialogues[currentDialogue];
            } else {
                document.getElementById('parrot-ui').style.display = 'none'; 
                const garden = document.getElementById('garden-entry');
                garden.style.display = 'block';
                garden.classList.add('blink');
                document.getElementById('finger-pointer').style.display = 'block'; 
            }
        }

        function goToGame() { window.location.href = 'game.html'; }

        function validate() {
            const p = document.getElementById('pName').value;
            const r = document.getElementById('rName').value;
            const c = document.getElementById('userCountry').value;
            document.getElementById('start-btn').disabled = !(p && r && c);
        }

        const tips = ["Наводим блеск...", "Готовим коктейли...", "Чистим песок..."];
        setInterval(() => {
            const el = document.getElementById('random-tip');
            if(el) el.innerText = tips[Math.floor(Math.random()*tips.length)];
        }, 1500);
    </script>
</body>
</html>
